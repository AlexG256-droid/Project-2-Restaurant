<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="HTML, CSS" />
    <meta name="description" content="Where2Bite" />
    <title>Random Restaurant Picker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/styles.css" />

    <style>
    .random-title {
      color: rgb(255, 255, 255);
      font-weight: bold;
      font-size: 48px;
    }
    </style>
  </head>

  <body>

    <header class="container py-4">
      <div class="row">
        <div class="col-12 text-center">
          <h1 class="random-title">
            Random Restaurant Picker
          </h1>
        </div>
      </div>
    </header>

    <main>
      <div class="container">

        <h2 class="favorites-title">
          Pick a Random Restaurant
        </h2>

        <div
          id="random-restaurant"
          class="row g-4"
        >
          <!-- Random restaurant will be inserted here -->
        </div>

      </div>
    </main>

    <div class="container text-center mt-4">

      <button
        type="button"
        id="pick-button"
        class="btn btn-success btn-lg"
      >
        Pick a Restaurant
      </button>
      <div class="container mt-3">

        <a
          href="/pages/restaurants.html"
          class="btn btn-primary"
        >
          Back to Restaurants
        </a>

        <button
          id="logout-button"
          class="btn btn-danger"
        >
          Logout
        </button>

      </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="../js/nav.js"></script>
    <script type="module" src="../js/random.js"></script>

  </body>
</html>
