<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="HTML, CSS" />
    <meta name="description" content="Where2Bite" />
    <title>Random Restaurant Picker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/styles.css" />
    <script type="module" src="../js/random.js"></script>

    <style>
      .random-title {
        color: rgb(67, 16, 16);
        font-weight: bold;
        font-size: 48px;
      }
    </style>
    
  </head>
  <body>
    <header class="container py-4">
      <div class="row">
        <div class="col-12 text-center">
          <h1 class="random-title">Random Restaurant Picker</h1>
        </div>
      </div>
    </header>

    <main>  
        <div class="container">
            <h2 class="random-title">Pick a Random Restaurant</h2>
            <div id="random-restaurant" class="row g-4">
                <!-- Random restaurant will be inserted here -->
            </div>
        </div>
    </main>


    <button type="button" id="pick-button">Pick a Restaurant</button>

    <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
