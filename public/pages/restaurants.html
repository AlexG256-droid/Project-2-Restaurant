<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="HTML, CSS" />
    <meta name="description" content="Where2Bite" />
    <title>Restaurants</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/styles.css" />

    <style>
      .random-title {
        color: rgb(255, 255, 255);
        font-weight: bold;
        font-size: 48px;
      }
      body {
        font-family: Roboto, sans-serif;
      }
    </style>
    
  </head>

  
  <body>
    <header class="container py-4">
      <div class="row">
        <div class="col-12 text-center">
          <h1 class="random-title">Restaurants</h1>
        </div>
      </div>
    </header>

    <main>  
        <ul id="restaurantResults"></ul>

        <div class="container">
            <h2 class="favorites-title">Restaurants</h2>
            <div id="restaurant" class="row g-4">
                <!-- Restaurants are added here -->
            </div>
        </div>
        <div class="container mb-4">
          <h3>Add Restaurant</h3>

          <form id="restaurant-form">
            <input
              id="name"
              class="form-control mb-2"
              placeholder="Restaurant Name"
              required
            >

            <input
              id="cuisine"
              class="form-control mb-2"
              placeholder="Cuisine"
              required
            >

            <input
              id="category"
              class="form-control mb-2"
              placeholder="Category"
            >

            <button
              type="submit"
              class="btn btn-primary"
            >
              Add Restaurant
            </button>
          </form>
        </div>
        <div class="mb-3">

        <a href="/pages/favorites.html" class="btn btn-warning">
          Favorites
        </a>

        <a href="/pages/random.html" class="btn btn-success">
          Random Picker
        </a>

        <button id="logout-button" class="btn btn-danger">
          Logout
        </button>

      </div>
    </main>

    <!-- <button type="button" id="pick-button">Pick a Restaurant</button> -->

    <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/restaurants.js"></script>  
  <script type="module" src="../js/nav.js"></script>
</body>
</html>
