<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where2Bite Restaurants</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script type="module" src="/js/restaurants.js" defer></script>
</head>
<body>
  <header>
    <h1>Where2Bite</h1>
    <nav>
      <a href="/pages/restaurants.html">Restaurants</a>
      <a href="/pages/favorites.html">Favorites</a>
      <a href="/pages/random.html">Random Picker</a>
      <button id="logout-button">Logout</button>
    </nav>
  </header>
  <main>
    <section class="card">
      <h2>Add Restaurant</h2>
      <form id="restaurant-form">
        <label for="name">Restaurant Name</label>
        <input id="name" name="name" required>

        <label for="cuisine">Cuisine</label>
        <input id="cuisine" name="cuisine" placeholder="Seafood, Asian, Italian" required>

        <label for="priceRange">Price Range</label>
        <select id="priceRange" name="priceRange">
          <option value="$">$</option>
          <option value="$$">$$</option>
          <option value="$$$">$$$</option>
          <option value="$$$$">$$$$</option>
        </select>

        <label for="location">Location</label>
        <input id="location" name="location">

        <label for="category">Category / Folder</label>
        <input id="category" name="category" placeholder="Seafood, Asian Cuisine, Sports Bar">

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes"></textarea>

        <button type="submit">Add Restaurant</button>
      </form>
      <p id="message" class="message"></p>
    </section>

    <section>
      <h2>My Restaurants</h2>
      <div id="restaurant-list"></div>
    </section>
  </main>
</body>
</html>
